<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Church Scale</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ── Login ─────────────────────────────────────────────────────────────── -->
<div id="login-overlay">
  <div class="login-card">
    <span class="cross-icon">✝</span>
    <h1>Church Scale</h1>
    <p class="subtitle">Sistema de Escalas de Voluntários</p>
    <form id="login-form">
      <label>
        Login do Ministério
        <input type="text" id="login-input" autocomplete="username" required>
      </label>
      <label>
        Senha
        <input type="password" id="senha-input" autocomplete="current-password" required>
      </label>
      <button type="submit" class="btn btn-primary btn-full">Entrar</button>
      <p id="login-error" class="error-msg"></p>
    </form>
  </div>
</div>

<!-- ── App Shell ──────────────────────────────────────────────────────────── -->
<div id="app-shell" hidden>
  <aside id="sidebar">
    <div class="sidebar-header">
      <h2>Church Scale</h2>
      <p id="ministry-name" style="color:var(--text-muted);font-size:.78rem"></p>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
  </aside>

  <div id="main-area">
    <header id="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button id="hamburger" aria-label="Menu">☰</button>
        <div class="topbar-info">
          <span class="ministry-name" id="topbar-ministry"></span>
          <span class="ministry-label">Ministério logado</span>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" id="logout-btn">Sair</button>
    </header>

    <main id="content"></main>
  </div>
</div>

<!-- ── Modal ──────────────────────────────────────────────────────────────── -->
<div id="modal-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" aria-label="Fechar">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ── Sidebar overlay (mobile) ──────────────────────────────────────────── -->
<div id="sidebar-overlay"></div>

<!-- ── Toast container ────────────────────────────────────────────────────── -->
<div id="toast-container" aria-live="polite"></div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
