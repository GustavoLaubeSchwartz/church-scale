server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/javascript text/javascript application/json;
    gzip_min_length 1024;

    # Proxy todas as chamadas de API para o backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Arquivos estáticos com cache
    location ~* \.(css|js|ico|png|jpg|jpeg|svg|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # SPA — qualquer rota volta para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
